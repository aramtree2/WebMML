<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
        <script src="MMLParser.js" type="module"></script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/reset-css@4.0.1/reset.min.css"
        />
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="Menu">
                Web MML
            </div>
            <div class="MML">
                <div id="RawMMLEditor" style="width: 95%; height: 40%;"></div>
                <br>
                <button id="submit">submit</button>
                <br>
                <div id="CellContainer" class="cell-container"></div>
                <div class="cell-toolbar">
                    <button id="cellDeleteBtn" class="cell-toolbar-btn">삭제</button>
                    <button id="cellEditBtn"   class="cell-toolbar-btn">편집</button>
                    <button id="cellInsertBtn" class="cell-toolbar-btn">추가</button>
                    <button id="cellUndoBtn"   class="cell-toolbar-btn">되돌리기</button>
                </div>
            </div>
            <div class="Instruments"></div>
            <div class="PianoRoll"></div>
            <div class="PianoSheet"></div>
            <div class="VirtualPiano">
                <script src="VirtualPiano.js" type="module"></script>
                <div class="Octave">
                    <canvas id="OctavePiano" width="760px" height="54px"></canvas>
                </div>
                <div class="Keys">
                    <canvas id="piano" width="760px" height="270px"></canvas>
                </div>
                <div class="VolumeSustain">
                    <canvas id="VolumeSustain" width="760px" height="54px"></canvas>
                </div>
            </div>
            <div class="Toolbar"></div>
        </div>
    </body>
</html>
